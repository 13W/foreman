# Wraps the foreman-planner as an A2A worker so foreman can discover it
# as a planner via the task_decomposition skill.

proxy:
  name: "planner"
  version: "0.1.0"
  bind: "127.0.0.1:7099"

wrapped_agent:
  command: "node"
  args:
    - "../planner/dist/cli.js"
    - "--config"
    - "./planner.yaml"
  env: {}
  cwd_strategy: "worktree"
  startup_timeout_sec: 30

role:
  description: |
    Plan decomposition specialist. Takes a high-level goal and emits a
    structured Plan with batches of subtasks for the worker pool.

  skills:
    - id: "task_decomposition"
      name: "Task decomposition"
      description: "Decompose a high-level goal into a structured plan of subtasks."
      tags: ["planning", "decomposition"]
      examples:
        - "Refactor the auth module and add tests"
        - "Migrate from CommonJS to ESM across the monorepo"

worktrees:
  base_dir: "./worktrees/planner"

