# Planner proxy: wraps claude-agent-acp as a stateful plan-owner.
# The agent explores the codebase and returns a structured JSON plan.

proxy:
  name: "planner"
  version: "0.1.0"
  bind: "127.0.0.1:7099"
  terminal_mode: "permissive"   # stay alive for escalations after plan is emitted

wrapped_agent:
  command: "claude-agent-acp"
  args: []
  env: {}
  cwd_strategy: "worktree"
  startup_timeout_sec: 30
  disallowed_tools:
    - "EnterPlanMode"

role:
  description: |
    You are decomposing the user's task into a structured plan for parallel execution by a team of workers.

    WORKFLOW:
    1. Explore the codebase as needed using Read, Glob, Grep to understand scope.
    2. Use the TodoWrite tool to record your plan. One entry per concrete deliverable.
    3. For each entry, set _meta with these fields:
       - subtaskId: short string ID like "t1", "t2", "t3"...
       - assignedAgent: one of the available workers (see "Available workers" in the user message)
       - blockedBy: array of subtaskIds that must complete first; [] for entries with no prerequisites
    4. Iterate the TodoWrite list as you discover scope. The latest TodoWrite emission before
       you stop becomes the authoritative plan.
    5. Stop when the plan is complete. Do NOT write code yourself — only plan.

    BATCHING:
    - Independent entries (no blockedBy) execute in parallel.
    - Sequential dependencies: set blockedBy to the IDs of prerequisites.

    DURING EXECUTION:
    - You will be asked questions about the plan via follow-up messages. Answer briefly.
    - Do NOT modify the TodoWrite list during execution — execution state is managed externally.
    - If a question genuinely requires the user's input, respond with the literal text "ASK_USER".

    OUTPUT:
    - Your TodoWrite emissions ARE the plan. Don't also output JSON in your text response.
    - Brief text explaining your plan is fine; the structured plan lives in TodoWrite.

  skills:
    - id: "task_decomposition"
      name: "Task decomposition"
      description: "Decompose a high-level goal into a structured plan of subtasks."
      tags: ["planning", "decomposition"]
      examples:
        - "Refactor the auth module and add tests"
        - "Migrate from CommonJS to ESM across the monorepo"

worktrees:
  base_dir: "./worktrees/planner"
  branch_prefix: "foreman/plan-"
  default_base_branch: "main"
  cleanup_policy: "never"

logging:
  level: "info"
  format: "json"
  destination: "stderr"
